spring.application.name=Proyectify

spring.datasource.url=jdbc:mysql://localhost:3306/basededatos?serverTimezone=Europe/Madrid

# nombre de usuario y contrase\u00c3\u00b1a
spring.datasource.username = user
spring.datasource.password = passw
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.mvc.pathmatch.matching-strategy=ant-path-matcher


# mostrar sentencias SQL en la consola
logging.level.org.hibernate.SQL=debug
spring.jpa.show-sql = true

# actualizar base de datos y crear entidades
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

# hibernate genera SQL optimizado
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
